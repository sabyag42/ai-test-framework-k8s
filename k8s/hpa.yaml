apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: test-api-hpa
  namespace: test-framework
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: test-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
