# Default values for test-api-chart

# Number of pods to run
replicaCount: 2

# Docker image config
image:
  repository: test-api
  tag: v1
  pullPolicy: Never

# Service config
service:
  type: NodePort
  port: 80
  targetPort: 8000
  nodePort: 30090

# Resource limits
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

# Autoscaling config
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50

# Health check probes
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

# OpenAI API key (injected as env var)
openaiApiKey: ""

# Namespace
namespace: test-framework
