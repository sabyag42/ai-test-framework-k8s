name: CI/CD Pipeline - AI Test Framework

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Create test file
        run: |
          cat > test_health.py << 'EOF'
          import sys
          sys.path.insert(0, './app')
          from unittest.mock import MagicMock
          sys.modules['ai_generator'] = MagicMock()
          from main import app
          from fastapi.testclient import TestClient
          client = TestClient(app)
          response = client.get('/health')
          assert response.status_code == 200
          print('Health check passed!')
          response2 = client.get('/')
          assert response2.status_code == 200
          print('Root endpoint passed!')
          EOF

      - name: Run tests
        run: python test_health.py

  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t test-api:${{ github.sha }} .

      - name: Verify image exists
        run: docker images | grep test-api

  deploy:
    name: 🚀 Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy notification
        run: |
          echo "Deploying AI Test Framework to Kubernetes!"
          echo "Image tag - ${{ github.sha }}"
          echo "Branch - ${{ github.ref }}"
          echo "Triggered by - ${{ github.actor }}"
          echo "In production this would run helm upgrade!"
